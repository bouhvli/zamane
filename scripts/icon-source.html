<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
      }
      svg { display: block; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#5A27FF" />
      <g id="mark">
        <circle cx="38" cy="50" r="22" fill="#FFFFFF" />
        <circle cx="62" cy="50" r="22" fill="#FFFFFF" fill-opacity="0.55" />
      </g>
    </svg>
    <script>
      if (location.search.includes("maskable")) {
        // Maskable icons get masked to a circle/rounded-square by the OS,
        // so shrink + center the mark to stay within the ~80% safe zone.
        document.getElementById("mark").setAttribute(
          "transform",
          "translate(50 50) scale(0.62) translate(-50 -50)"
        );
      }
    </script>
  </body>
</html>
