<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Shared trips, shopping, and goals for you and your partner, in one calm, mobile-first app." />
    <meta name="theme-color" content="#EEF2E9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E1512" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zamane" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Zamane</title>

    <!-- Discovered immediately during HTML parsing, unlike a CSS @import
         — connection setup for Google Fonts starts before any stylesheet
         has even downloaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Plus Jakarta Sans is the single UI + display family (--font-sans /
         --font-heading, see theme.css): the warm geometric sans of the
         travel-app design language. Weights 400-800 cover body through bold
         headlines and the .font-display treatment; italic 500 for the rare
         emphasis. JetBrains Mono stays for numerics (prices, invite code). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
