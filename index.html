<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Shared trips, finances, and goals for you and your partner, in one calm, mobile-first app." />
    <meta name="theme-color" content="#5A27FF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0A0D" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zamane" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Zamane</title>

    <!-- Discovered immediately during HTML parsing, unlike a CSS @import
         (see src/styles/fonts.css) — connection setup for Google Fonts
         starts before any stylesheet has even downloaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oi&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    />
    <!-- Self-hosted display font used by every page's h1-h3 (see PageHero) —
         preloaded so it doesn't compete with the Google Fonts request above. -->
    <link rel="preload" href="/fonts/Cintarini.ttf" as="font" type="font/ttf" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
